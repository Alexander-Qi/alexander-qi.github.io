        highlights:
          - "Engaged in cross-disciplinary dialogues focusing on the future of sustainable chemistry and quantum catalysis."
          - "Presented doctoral research on transient intermediates and EPR spectroscopy to a global audience of peers and Laureates."
          - "Established international academic networks with leading researchers in the fields of photochemistry and radical chemistry."

