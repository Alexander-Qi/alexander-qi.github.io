    Publications:
      - title: "Direct Observation of All Open-Shell Intermediates in a Photocatalytic Cycle"
        authors: ["Jian-Qing Qi#", "Weiqun Suo#", "Jing Liu", "Songtao Sun", "Lei Jiao*", "Xingwei Guo*"]
        publisher: "J. Am. Chem. Soc."
        releaseDate: "2024-03"
        url: "https://doi.org/10.1021/jacs.3c14471"
        summary: "Achieved the first-time direct observation and kinetic characterization of all radical intermediates in a complex photocatalytic reaction using advanced TREPR."

      - title: "Overestimated Halogen Atom Transfer Reactivity of α-Aminoalkyl Radicals"
        authors: ["Weiqun Suo#", "Jian-Qing Qi#", "Jing Liu", "Songtao Sun", "Lei Jiao*", "Xingwei Guo*"]
        publisher: "J. Am. Chem. Soc."
        releaseDate: "2024-09"
        url: "https://doi.org/10.1021/jacs.4c09792"
        summary: "Established a reliable XAT reactivity scale for α-aminoalkyl radicals, challenging previous beliefs about their radical kinetics."

      - title: "Characterization and Monitoring of Transient Enamine Radical Intermediates in Photoredox/Chiral Primary Amine Synergistic Catalytic Cycle"
        authors: ["Shixue Zhang#", "Liang Cheng#", "Jian-Qing Qi#", "Zongbin Jia", "Long Zhang", "Lei Jiao*", "Xingwei Guo*", "Sanzhong Luo*"]
        publisher: "CCS Chemistry"
        releaseDate: "2024-04"
        url: "https://doi.org/10.31635/ccschem.024.202404035"
        summary: "Direct observation of transient enamine radical cations and α-imino radicals for the first time on a microsecond timescale."

      - title: "Time-resolved electron paramagnetic resonance spectrometer based on ultrawide single-sideband phase-sensitive detection"
        authors: ["Shixue Zhang", "Shengqi Zhou", "Jian-Qing Qi", "Lei Jiao", "Xingwei Guo"]
        publisher: "Rev. Sci. Instrum."
        releaseDate: "2023-08"
        url: "https://doi.org/10.1063/5.0143480"

      - title: "DFT Study on the Mechanism of 4,4′-Bipyridine-Catalyzed Nitrobenzene Reduction by Diboron(4) Compounds"
        authors: ["Jian-Qing Qi", "Lei Jiao"]
        publisher: "J. Org. Chem."
        releaseDate: "2020-11"
        url: "https://doi.org/10.1021/acs.joc.0c01963"

